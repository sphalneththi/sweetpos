version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: sweetpos-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: sweetpos
      POSTGRES_PASSWORD: sweetpos_dev_password
      POSTGRES_DB: sweetpos
    ports:
      - "5432:5432"
    volumes:
      - sweetpos_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sweetpos"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  sweetpos_pgdata:
