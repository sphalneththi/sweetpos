version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: sweetpos-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: sweetpos
      POSTGRES_PASSWORD: sweetpos_dev_password
      POSTGRES_DB: sweetpos
    ports:
      - "5432:5432"
    volumes:
      - sweetpos_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sweetpos"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    container_name: sweetpos-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: sweetpos
      DB_USERNAME: sweetpos
      DB_PASSWORD: sweetpos_dev_password
      JWT_SECRET: sweetpos-super-secret-key-change-in-production-min-256-bits-long
    ports:
      - "8080:8080"

volumes:
  sweetpos_pgdata:
