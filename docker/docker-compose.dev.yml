version: '3.8'

services:
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    volumes:
      - pgdata-dev:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: sweetpos
      POSTGRES_USER: sweetpos
      POSTGRES_PASSWORD: sweetpos_dev_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sweetpos"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata-dev:
    driver: local
