version: '3.8'

services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    ports:
      - "${API_PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USERNAME=${DB_USERNAME:-sweetpos}
      - DB_PASSWORD=${DB_PASSWORD:-sweetpos_dev_password}
      - DB_DATABASE=${DB_DATABASE:-sweetpos}
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET:-change-me-in-production}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-change-me-in-production}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - sweetpos-net

  db:
    image: postgres:16-alpine
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${DB_DATABASE:-sweetpos}
      POSTGRES_USER: ${DB_USERNAME:-sweetpos}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-sweetpos_dev_password}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-sweetpos}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - sweetpos-net

volumes:
  pgdata:
    driver: local

networks:
  sweetpos-net:
    driver: bridge
