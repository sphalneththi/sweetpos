name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: sweetpos_test
          POSTGRES_USER: sweetpos
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      
      - uses: pnpm/action-setup@v4
        with:
          version: 9.4.0
      
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Type check
        run: pnpm turbo build --filter=@sweetpos/shared-types
      
      - name: Lint
        run: pnpm turbo lint
        continue-on-error: true
      
      - name: Test API
        run: pnpm --filter @sweetpos/api test
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: sweetpos
          DB_PASSWORD: test_password
          DB_DATABASE: sweetpos_test
          JWT_ACCESS_SECRET: test-secret
          JWT_REFRESH_SECRET: test-refresh-secret
      
      - name: Build API
        run: pnpm --filter @sweetpos/api build
      
      - name: Build Renderer
        run: pnpm --filter @sweetpos/renderer build
